<div class="min-h-screen bg-slate-50 font-sans pb-24 lg:pb-8 flex flex-col">
    <!-- Header -->
    <div class="bg-blue-600 shadow-md relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-4">
                    <div>
                        <h1 class="text-2xl font-bold text-white tracking-tight flex items-center gap-2">
                            Mapa de Asesores
                        </h1>
                        <p class="text-blue-100 text-sm font-medium">Visualiza la ubicación actual</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenido principal -->
    <main class="flex-1 w-full flex flex-col pt-6">
        <div class="flex-1 w-full px-4 sm:px-6 lg:px-8 mb-6 h-full min-h-[500px]">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden h-[calc(100vh-200px)] relative">
                <!-- Capa del mapa -->
                <div id="map" class="w-full h-full z-0"></div>
                
                <div *ngIf="cargando" class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-80 z-10 transition-opacity">
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                        <p class="text-slate-600 font-medium">Cargando ubicaciones...</p>
                    </div>
                </div>

                <div *ngIf="!cargando && errorMsg" class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-90 z-10 p-4">
                    <div class="bg-red-50 p-6 rounded-2xl max-w-sm text-center border border-red-100 shadow-lg">
                        <svg class="h-12 w-12 text-red-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        <h3 class="text-lg font-bold text-slate-800 mb-1">Hubo un problema</h3>
                        <p class="text-slate-600 text-sm">{{ errorMsg }}</p>
                    </div>
                </div>

                <div *ngIf="!cargando && asesoresLocations.length === 0 && !errorMsg" class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-80 z-10 p-4">
                    <div class="text-center bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                        <div class="bg-amber-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="h-8 w-8 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.242-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 tracking-tight">Sin asesores</h3>
                        <p class="text-slate-500 mt-2">No hay asesores compartiendo su ubicación.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
