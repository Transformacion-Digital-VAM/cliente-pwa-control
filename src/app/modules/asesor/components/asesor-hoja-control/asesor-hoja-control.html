<div class="min-h-screen bg-slate-100 font-sans pb-24">
  
  <div class="bg-blue-700 text-white p-4 sticky top-0 z-50 shadow-lg">
    <div class="flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <button class="p-1 hover:bg-blue-600 rounded-full transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <div>
          <h1 class="text-lg font-bold leading-tight">Hoja de Control</h1>
          <p class="text-[10px] text-blue-200 uppercase tracking-widest font-semibold">Grupo: Los Emprendedores</p>
        </div>
      </div>
      <div class="bg-white/20 px-3 py-1 rounded-lg">
        <span class="text-xs font-bold">CVE-0492</span>
      </div>
    </div>
  </div>

  <div class="p-4 space-y-4">
    
    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200 flex justify-between items-center">
      <div>
        <p class="text-slate-400 text-[10px] font-bold uppercase">Próxima Visita</p>
        <p class="text-slate-700 font-bold text-sm">Miércoles - 10:30 AM</p>
      </div>
      <div class="text-right">
        <p class="text-slate-400 text-[10px] font-bold uppercase">Tasa</p>
        <p class="text-blue-600 font-bold text-sm">15.00%</p>
      </div>
    </div>

    <div class="flex items-center space-x-2 pt-2">
      <span class="h-4 w-1 bg-blue-600 rounded-full"></span>
      <h3 class="text-slate-800 font-bold text-sm uppercase tracking-wider">Control por Integrante</h3>
    </div>

    <div class="space-y-4">
      
      <div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden">
        <div class="bg-slate-50 px-4 py-3 border-b border-slate-100 flex justify-between items-center">
          <div class="flex items-center space-x-3">
            <span class="h-8 w-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xs italic">01</span>
            <p class="font-bold text-slate-800 text-sm">MARÍA ELENA LÓPEZ</p>
          </div>
          <span class="text-[9px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-md font-bold uppercase tracking-tighter">Presidenta</span>
        </div>

        <div class="p-4 space-y-4">
          <div class="space-y-1.5">
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Cantidad Otorgada</label>
            <div class="relative">
              <span class="absolute left-4 top-2.5 text-slate-400 font-bold">$</span>
              <input type="number" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-8 pr-4 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/10 focus:border-blue-500" placeholder="0.00">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">¿Pago Solidario?</label>
              <label class="relative inline-flex items-center cursor-pointer pt-2">
                <input type="checkbox" class="sr-only peer">
                <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
                <span class="ml-3 text-xs font-bold text-slate-500 peer-checked:text-emerald-600 uppercase">Sí</span>
              </label>
            </div>

            <div class="space-y-1.5">
              <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Fecha de Pago</label>
              <input type="date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs font-bold text-slate-700 outline-none">
            </div>
          </div>
          
          <button class="w-full py-2 bg-slate-50 text-blue-600 border border-blue-100 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-blue-50">
            Ver historial completo
          </button>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden opacity-80">
        <div class="bg-slate-50 px-4 py-3 border-b border-slate-100 flex justify-between items-center">
          <div class="flex items-center space-x-3">
            <span class="h-8 w-8 bg-slate-200 text-slate-500 rounded-full flex items-center justify-center font-bold text-xs italic">02</span>
            <p class="font-bold text-slate-800 text-sm">CARMEN JUÁREZ</p>
          </div>
          <span class="text-[9px] bg-slate-200 text-slate-400 px-2 py-0.5 rounded-md font-bold uppercase tracking-tighter italic">Integrante</span>
        </div>
        <div class="p-4 flex items-center justify-center italic text-slate-400 text-xs">
          Toque para expandir datos de control
        </div>
      </div>

    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-100 via-slate-100 to-transparent">
    <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-xl shadow-blue-200 active:scale-95 transition-transform">
      Guardar Control de Pagos
    </button>
  </div>
</div>
