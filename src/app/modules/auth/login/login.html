<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-8 text-center text-slate-900 tracking-tight">Inicio de Sesión</h2>

    <div *ngIf="errorMessage" 
         class="mb-6 p-3 rounded-lg bg-red-50 border border-red-200 flex items-center gap-3 text-red-700 text-sm animate-pulse">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 flex-shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form (submit)="$event.preventDefault(); onLogin()" class="space-y-6">
      <div>
        <label for="user" class="block text-sm font-medium text-slate-900 mb-2">
          Usuario
        </label>
        <input type="text" id="user" name="user" [(ngModel)]="loginData.username" placeholder="Nombre de usuario"
          required
          [disabled]="isLoading"
          class="block w-full rounded-md border-0 py-2.5 px-3.5 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm sm:leading-6 transition-all disabled:bg-slate-50 disabled:text-slate-500" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-900 mb-2">
          Password
        </label>
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"
            [(ngModel)]="loginData.password" placeholder="••••••••" required
            [disabled]="isLoading"
            class="block w-full rounded-md border-0 py-2.5 pl-3.5 pr-10 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm sm:leading-6 transition-all disabled:bg-slate-50 disabled:text-slate-500" />

          <button type="button" (click)="showPassword = !showPassword" [disabled]="isLoading"
            class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 focus:outline-none">
            
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.483 8.61 6.645 6.5 10 6.5s6.517 2.11 7.964 5.178c.07.149.07.321 0 .47C16.517 15.39 13.355 17.5 10 17.5s-6.517-2.11-7.964-5.178Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>

            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3.98 8.223a11.055 11.055 0 0 0-1.944 3.455 10.035 10.035 0 0 0 0 3.12 10.04 10.04 0 0 0 16.96 0c.23-.393.431-.806.598-1.231M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6.362-3.638L21 7.5m-18 1.2a10.99 10.99 0 0 1 2.362-2.362M3 3l18 18" />
            </svg>
          </button>
        </div>
      </div>

      <div>
        <button type="submit"
          [disabled]="isLoading"
          class="flex w-full justify-center items-center rounded-full bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 transition-all active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed">
          
          <span *ngIf="!isLoading">Iniciar Sesión</span>
          
          <div *ngIf="isLoading" class="flex items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Verificando...</span>
          </div>
        </button>
      </div>
    </form>

    <p class="mt-8 text-center text-xs text-slate-500">
      Sus datos se sincronizarán automáticamente al recuperar la conexión.
    </p>
  </div>
</div>
