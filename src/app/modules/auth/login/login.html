<div class="min-h-screen flex flex-col bg-white font-sans">
  
  <div class="relative h-64 bg-blue-600 rounded-b-[3.5rem] flex items-center justify-center shadow-xl shadow-blue-200/50">
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-20">
      <div class="absolute -top-10 -left-10 w-40 h-40 bg-white rounded-full blur-3xl"></div>
      <div class="absolute top-20 -right-10 w-64 h-64 bg-blue-600 rounded-full blur-3xl"></div>
    </div>
    
    <div class="relative z-10 flex flex-col items-center">
      <img src="assets/LogoOficialVAM.avif" alt="LogoOficialVAM" class="h-24 w-auto drop-shadow-2xl">
    </div>
  </div>

  <div class="flex-1 flex flex-col items-center px-6 -mt-12 relative z-20">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] p-8">
      
      <h2 class="text-3xl font-black mb-8 text-center text-indigo-900 tracking-tight">¡Bienvenido!</h2>

      <div *ngIf="errorMessage" 
           class="mb-6 p-4 rounded-2xl bg-red-50 border border-red-100 flex items-center gap-3 text-red-600 text-sm animate-shake">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
        <span class="font-semibold">{{ errorMessage }}</span>
      </div>

      <form (submit)="$event.preventDefault(); onLogin()" class="space-y-5">
        
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
            </svg>
          </div>
          <input type="text" id="user" name="user" [(ngModel)]="loginData.username" 
                 placeholder="Usuario" required [disabled]="isLoading"
                 class="block w-full bg-slate-50 border border-slate-200 rounded-full py-4 pl-12 pr-6 text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-sm" />
        </div>

        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
            </svg>
          </div>
          <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"
                 [(ngModel)]="loginData.password" placeholder="Contraseña" required [disabled]="isLoading"
                 class="block w-full bg-slate-50 border border-slate-200 rounded-full py-4 pl-12 pr-12 text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-sm" />

          <button type="button" (click)="showPassword = !showPassword"
                  class="absolute inset-y-0 right-0 pr-5 flex items-center text-slate-400 hover:text-blue-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="showPassword ? 'M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.483 8.61 6.645 6.5 10 6.5s6.517 2.11 7.964 5.178c.07.149.07.321 0 .47C16.517 15.39 13.355 17.5 10 17.5s-6.517-2.11-7.964-5.178Z' : 'M3.98 8.223a11.055 11.055 0 0 0-1.944 3.455 10.035 10.035 0 0 0 0 3.12 10.04 10.04 0 0 0 16.96 0c.23-.393.431-.806.598-1.231M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6.362-3.638L21 7.5m-18 1.2a10.99 10.99 0 0 1 2.362-2.362M3 3l18 18'" />
            </svg>
          </button>
        </div>

        <div class="pt-4">
          <button type="submit" [disabled]="isLoading"
                  class="flex w-full justify-center items-center rounded-full bg-blue-600 px-4 py-4 text-lg font-bold text-white shadow-lg shadow-blue-200 hover:shadow-blue-300 hover:scale-[1.02] transition-all active:scale-95 disabled:opacity-70">
            <span *ngIf="!isLoading">Iniciar Sesión</span>
            <div *ngIf="isLoading" class="flex items-center gap-2">
              <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
            </div>
          </button>
        </div>
      </form>

      <p class="mt-10 text-center text-xs font-medium text-slate-400 uppercase tracking-widest">
        Sincronización automática activa
      </p>
    </div>
  </div>
</div>
