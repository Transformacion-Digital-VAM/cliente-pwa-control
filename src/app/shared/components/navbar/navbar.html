<nav class="bg-white border-b border-gray-100 py-4 px-6">
  <div class="container mx-auto flex items-center justify-between">
    
    <!-- Logo / título -->
    <div class="flex items-center space-x-2 cursor-pointer" routerLink="/">
      <span class="text-xl font-bold text-slate-900 tracking-tight">Hoja de Control</span>
    </div>

    <!-- Enlaces de navegación (solo para usuarios autenticados) -->
    <div class="hidden md:flex items-center space-x-10" *ngIf="isUserLoggedIn">
      <ng-container *ngIf="isAdmin">
        <a routerLink="/home-admin" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">Inicio Admin</a>
        <a routerLink="/hoja-control-admin" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">Control Interno</a>
      </ng-container>

      <ng-container *ngIf="isUser">
        <a routerLink="/home-asesor" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">Inicio Asesor</a>
        <a routerLink="/hoja-control-asesor" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">Asesor</a>
      </ng-container>
    </div>

    <!-- Botones de autenticación y perfil -->
    <div class="flex items-center space-x-8">
      <!-- Botón de iniciar sesión (solo si no está logueado) -->
      <button *ngIf="!isUserLoggedIn" routerLink="/login" class="bg-blue-600 text-white text-sm font-semibold py-2.5 px-6 rounded-full hover:bg-blue-700 transition-all shadow-sm active:scale-95">
        Iniciar Sesión
      </button>


      <!-- Botón de cerrar sesión (solo si está logueado) -->
      <button *ngIf="isUserLoggedIn" (click)="logout()" class="bg-red-500 text-white text-sm font-semibold py-2.5 px-6 rounded-full hover:bg-red-600 transition-all shadow-sm active:scale-95">
        Cerrar Sesión
      </button>
    </div>

  </div>
</nav>
